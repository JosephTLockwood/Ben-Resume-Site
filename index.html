  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 oklch(78% 0.15 75);\">LINKEDIN<\u002Fa>\n          <a href=\"#top\" style=\"color: #B8B2A6; text-decoration: none; font-size: 13px; font-weight: 600; letter-spacing: 0.16em; transition: color 0.25s ease;\" style-hover=\"color: oklch(78% 0.15 75);\">GITHUB<\u002Fa>\n          <a href=\"{{ resumeHref }}\" target=\"_blank\" style=\"color: #B8B2A6; text-decoration: none; font-size: 13px; font-weight: 600; letter-spacing: 0.16em; transition: color 0.25s ease;\" style-hover=\"color: oklch(78% 0.15 75);\">RESUME PDF<\u002Fa>\n        <\u002Fdiv>\n        <span style=\"font-size: 13px; color: #5C574E;\">© 2026 Ben Lockwood<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { years: 0, projects: 0, patents: 0, prototypes: 0, statsStarted: false };\n\n  componentDidMount() {\n    // --- scroll progress bar ---\n    this._onScroll = () => {\n      const bar = document.getElementById('scroll-progress');\n      if (!bar) return;\n      const doc = document.documentElement;\n      const max = doc.scrollHeight - window.innerHeight;\n      bar.style.width = (max > 0 ? (window.scrollY / max) * 100 : 0) + '%';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n\n    // --- custom cursor ring (fine pointers only) ---\n    if (window.matchMedia && window.matchMedia('(pointer: fine)').matches) {\n      this._mx = window.innerWidth / 2; this._my = window.innerHeight / 2;\n      this._cx = this._mx; this._cy = this._my;\n      this._scale = 1; this._tScale = 1; this._seen = false;\n      this._onMove = (e) => {\n        this._mx = e.clientX; this._my = e.clientY; this._seen = true;\n        const t = e.target && e.target.closest ? e.target.closest('a, button, [data-cursor]') : null;\n        this._tScale = t ? 2.1 : 1;\n      };\n      window.addEventListener('mousemove', this._onMove, { passive: true });\n      const loop = () => {\n        const ring = document.getElementById('cur-ring');\n        if (ring && this._seen) {\n          this._cx += (this._mx - this._cx) * 0.16;\n          this._cy += (this._my - this._cy) * 0.16;\n          this._scale += (this._tScale - this._scale) * 0.16;\n          ring.style.opacity = '1';\n          ring.style.transform = 'translate(' + (this._cx - 18) + 'px,' + (this._cy - 18) + 'px) scale(' + this._scale.toFixed(3) + ')';\n        }\n        this._raf = requestAnimationFrame(loop);\n      };\n      this._raf = requestAnimationFrame(loop);\n    }\n\n    // --- scroll reveals ---\n    // IntersectionObserver never fires in hidden documents (background captures,\n    // share thumbnails) — only hide elements when the page is actually visible.\n    const hiddenDoc = document.visibilityState === 'hidden';\n    const reveals = Array.from(document.querySelectorAll('[data-reveal]'));\n    if (hiddenDoc) {\n      // show everything and finish counters immediately\n      this.setState({ statsStarted: true, years: 4, projects: 5, patents: 4, prototypes: 4 });\n      return;\n    }\n    reveals.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(36px)';\n      el.style.transition = 'opacity 0.9s cubic-bezier(0.2, 0.7, 0.2, 1), transform 0.9s cubic-bezier(0.2, 0.7, 0.2, 1)';\n      el.style.willChange = 'opacity, transform';\n    });\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (!entry.isIntersecting) return;\n        const delay = parseFloat(entry.target.getAttribute('data-reveal')) || 0;\n        const el = entry.target;\n        setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'none'; }, delay * 1000);\n        this._io.unobserve(el);\n      });\n    }, { threshold: 0.12 });\n    reveals.forEach((el) => this._io.observe(el));\n\n    // --- stats counters ---\n    const band = document.getElementById('stats-band');\n    if (band) {\n      this._statsIo = new IntersectionObserver((entries) => {\n        if (entries.some((e) => e.isIntersecting)) {\n          this._startStats();\n          this._statsIo.disconnect();\n        }\n      }, { threshold: 0.3 });\n      this._statsIo.observe(band);\n    }\n  }\n\n  _startStats() {\n    if (this.state.statsStarted) return;\n    this.setState({ statsStarted: true });\n    const targets = { years: 4, projects: 5, patents: 4, prototypes: 4 };\n    const dur = 1500;\n    const t0 = performance.now();\n    const step = (t) => {\n      const p = Math.min(1, (t - t0) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      this.setState({\n        years: Math.round(targets.years * e),\n        projects: Math.round(targets.projects * e),\n        patents: Math.round(targets.patents * e),\n        prototypes: Math.round(targets.prototypes * e)\n      });\n      if (p < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._onMove) window.removeEventListener('mousemove', this._onMove);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._io) this._io.disconnect();\n    if (this._statsIo) this._statsIo.disconnect();\n  }\n\n  renderVals() {\n    // marquee strip — built here (memoized) so the animation survives re-renders\n    if (!this._marquee) {\n      const words = ['MECHATRONICS', 'ROBOTICS', 'CAD + CAM', '3D PRINTING'];\n      const items = [];\n      for (let r = 0; r < 4; r++) {\n        words.forEach((w, i) => {\n          items.push(React.createElement('span', {\n            key: r + '-' + i + '-w',\n            style: { fontFamily: \"'Anton', sans-serif\", fontSize: '26px', letterSpacing: '0.06em', color: r % 2 === 0 ? '#F4F1EA' : 'transparent', WebkitTextStroke: r % 2 === 0 ? '0' : '1px #5C574E' }\n          }, w));\n          items.push(React.createElement('span', {\n            key: r + '-' + i + '-d',\n            style: { color: 'oklch(78% 0.15 75)', fontSize: '18px' }\n          }, '✦'));\n        });\n      }\n      this._marquee = React.createElement('div', {\n        style: { display: 'flex', gap: '40px', alignItems: 'center', whiteSpace: 'nowrap', width: 'max-content', paddingRight: '40px', animation: 'marq 32s linear infinite' }\n      }, items);\n    }\n    if (!this._scrollCue) {\n      this._scrollCue = React.createElement('span', {\n        style: { width: '2px', height: '44px', background: 'oklch(78% 0.15 75)', display: 'inline-block', animation: 'cue 1.8s ease-in-out infinite' }\n      });\n    }\n    // assemble email at runtime so static-HTML email-protection proxies can't rewrite it\n    const email = ['blockwood', 'lssu.edu'].join('@');\n    return {\n      resumeHref: (window.__resources && window.__resources.resumePdf) || 'uploads/resume.pdf',\n      email: email,\n      mailto: 'mailto:' + email,\n      marquee: this._marquee,\n      scrollCue: this._scrollCue,\n      years: String(this.state.years),\n      projects: String(this.state.projects),\n      patents: String(this.state.patents),\n      prototypes: String(this.state.prototypes)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
